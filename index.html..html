<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomoro Coffee - Standalone</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-tomoro-brown: #3C2A21;
            --color-tomoro-gold: #D35400;
            --color-tomoro-cream: #FDFCFB;
            --font-heading: "Poppins", sans-serif;
            --font-sans: "Inter", sans-serif;
        }
        @layer base {
            html { scroll-behavior: smooth; }
            ::-webkit-scrollbar { width: 8px; }
            ::-webkit-scrollbar-track { background: #FDFCFB; }
            ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
            ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-tomoro-cream font-sans text-tomoro-brown selection:bg-tomoro-gold selection:text-white">

    <!-- Navbar -->
    <nav class="sticky top-0 z-40 w-full bg-tomoro-cream/90 backdrop-blur-md border-b border-tomoro-brown/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-tomoro-brown rounded-xl flex items-center justify-center shadow-lg">
                        <i data-lucide="coffee" class="text-tomoro-gold w-6 h-6"></i>
                    </div>
                    <span class="font-heading font-black text-2xl text-tomoro-brown tracking-tighter uppercase">TOMORO</span>
                </div>

                <div class="hidden md:flex items-center space-x-10">
                    <a href="#" class="text-tomoro-brown/70 hover:text-tomoro-gold font-bold transition-all uppercase text-xs tracking-widest">Beranda</a>
                    <a href="#menu" class="text-tomoro-brown/70 hover:text-tomoro-gold font-bold transition-all uppercase text-xs tracking-widest">Menu</a>
                    <a href="#" class="text-tomoro-brown/70 hover:text-tomoro-gold font-bold transition-all uppercase text-xs tracking-widest">Lokasi</a>
                    <button onclick="toggleCart(true)" class="relative p-2 text-tomoro-brown hover:text-tomoro-gold transition-transform active:scale-90">
                        <i data-lucide="shopping-bag" class="h-6 w-6"></i>
                        <span id="cart-count-desktop" class="hidden absolute -top-1 -right-1 flex items-center justify-center min-w-5 h-5 px-1 text-[10px] font-black text-white bg-tomoro-gold rounded-full ring-2 ring-tomoro-cream">0</span>
                    </button>
                </div>
                
                <div class="md:hidden flex items-center gap-4">
                    <button onclick="toggleCart(true)" class="relative p-2">
                        <i data-lucide="shopping-bag" class="h-6 w-6"></i>
                        <span id="cart-count-mobile" class="hidden absolute -top-1 -right-1 flex items-center justify-center min-w-5 h-5 px-1 text-[10px] font-black text-white bg-tomoro-gold rounded-full ring-2 ring-tomoro-cream">0</span>
                    </button>
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="relative h-[80vh] flex items-center bg-tomoro-brown overflow-hidden">
        <div class="absolute inset-0 opacity-40">
            <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=2000" class="w-full h-full object-cover">
        </div>
        <div class="max-w-7xl mx-auto px-4 relative z-10 w-full text-center md:text-left">
            <div class="max-w-3xl">
                <span class="inline-block bg-tomoro-gold text-white text-[10px] font-black px-4 py-2 rounded-full mb-8 uppercase tracking-[0.3em] shadow-2xl">Premium Coffee House</span>
                <h1 class="font-heading font-black text-6xl md:text-8xl text-tomoro-cream mb-8 leading-[0.85] tracking-tighter">TOMORO <br><span class="text-tomoro-gold">EXPERIENCE</span></h1>
                <p class="text-tomoro-cream/60 text-xl mb-12 max-w-lg font-light leading-relaxed">Dari biji kopi pilihan dunia pilihan para master, hingga ke genggamanmu.</p>
                <div class="flex flex-col sm:flex-row gap-4">
                    <a href="#menu" class="bg-tomoro-gold text-white font-black px-12 py-5 rounded-2xl hover:bg-white hover:text-tomoro-brown transition-all shadow-2xl flex items-center justify-center gap-3">PESAN SEKARANG <i data-lucide="arrow-right" class="w-5 h-5"></i></a>
                    <a href="#" class="bg-white/10 backdrop-blur-xl border border-white/20 text-white font-bold px-12 py-5 rounded-2xl hover:bg-white/20 transition-all text-center">CARI OUTLET</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Menu -->
    <section id="menu" class="py-24 px-4">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row md:items-end justify-between mb-16 gap-8">
                <div>
                    <div class="flex items-center gap-2 mb-4">
                        <div class="w-8 h-[2px] bg-tomoro-gold"></div>
                        <span class="text-tomoro-gold font-black text-xs uppercase tracking-widest">Our Selection</span>
                    </div>
                    <h2 class="font-heading font-black text-5xl text-tomoro-brown tracking-tighter uppercase">Curated Menu</h2>
                </div>
                <div id="categories" class="flex flex-wrap gap-2"></div>
            </div>

            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-8 gap-y-12"></div>
        </div>
    </section>

    <!-- Sidebar & Modals... [Rest of standard Cart UI] -->
    <div id="cart-backdrop" onclick="toggleCart(false)" class="hidden fixed inset-0 bg-tomoro-brown/80 backdrop-blur-md z-50"></div>
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full sm:w-[450px] bg-white shadow-2xl z-50 flex flex-col translate-x-full transition-transform duration-500 ease-in-out">
        <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-tomoro-cream">
            <h2 class="font-heading font-black text-2xl text-tomoro-brown uppercase tracking-tighter">KERANJANG</h2>
            <button onclick="toggleCart(false)" class="p-3 bg-white rounded-full shadow-sm hover:bg-tomoro-gold hover:text-white transition-all"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
        <div id="cart-footer" class="hidden p-8 bg-tomoro-cream border-t border-gray-100 shadow-2xl">
            <div class="flex justify-between font-black text-2xl text-tomoro-brown mb-6">
                <span class="tracking-tighter uppercase">TOTAL</span>
                <span id="cart-total">Rp 0</span>
            </div>
            <button onclick="openCheckout()" class="w-full bg-tomoro-brown text-white font-black py-5 rounded-2xl hover:bg-tomoro-gold transition-all shadow-xl tracking-widest uppercase">PROSES CHECKOUT</button>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="checkout-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4">
        <div onclick="closeCheckout()" class="absolute inset-0 bg-tomoro-brown/95 backdrop-blur-xl"></div>
        <div class="relative bg-white rounded-[3rem] shadow-2xl w-full max-w-md p-10 text-center animate-fade-in">
            <div class="w-24 h-24 bg-tomoro-gold/10 text-tomoro-gold rounded-full flex items-center justify-center mx-auto mb-8">
                <i data-lucide="check-circle-2" class="w-12 h-12"></i>
            </div>
            <h2 class="font-heading font-black text-3xl text-tomoro-brown mb-4 uppercase tracking-tighter">Terima Kasih!</h2>
            <p class="text-gray-500 mb-8 font-light italic">Pesanan Anda <span id="order-id" class="font-bold text-tomoro-brown">#TMR-0000</span> sedang disiapkan.</p>
            <button onclick="closeCheckout(); toggleCart(false);" class="w-full bg-tomoro-brown text-white font-black py-4 rounded-2xl hover:bg-tomoro-gold transition-all tracking-widest uppercase">KEMBALI KE MENU</button>
        </div>
    </div>

    <script>
        const menuItems = [
            { id: "cc1", name: "Kopi Susu Aren", description: "Biji kopi 100% Arabica dengan gula aren premium.", price: 22000, category: "Classic", image: "https://images.unsplash.com/photo-1541167760496-162955ed8a9f?q=80&w=800", available: true },
            { id: "cc2", name: "Spanish Latte", description: "Perpaduan kental manis dan espresso lembut.", price: 30000, category: "Classic", image: "https://images.unsplash.com/photo-1551030173-122aabc4489c?q=80&w=800", available: true },
            { id: "cc8", name: "Coconut Latte", description: "Kesegaran kelapa dalam racikan kopi premium.", price: 28000, category: "Master Series", image: "https://images.unsplash.com/photo-1553177595-4de2bb0842b9?q=80&w=800", available: true },
            { id: "ps1", name: "Pistachio Latte", description: "Nutty, creamy, dan aroma pistachio yang menggoda.", price: 31000, category: "Pistachio", image: "https://images.unsplash.com/photo-1572442388796-11668a67e53d?q=80&w=800", available: true, isNew: true },
            { id: "c4", name: "Cloud Macchiato", description: "Foam lembut selembut awan dengan drizzle caramel.", price: 30000, category: "Cloud Series", image: "https://images.unsplash.com/photo-1578314675249-a6910f80cc4e?q=80&w=800", available: true },
            { id: "nc3", name: "Premium Chocolate", description: "Cokelat Belgian murni pilihan para master.", price: 21000, category: "Non-Coffee", image: "https://images.unsplash.com/photo-1542990253-0d0f5be5f0ed?q=80&w=800", available: true },
            { id: "nc4", name: "Matcha Oat Latte", description: "Bubuk matcha authentic dengan susu oat gurih.", price: 27000, category: "Non-Coffee", image: "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?q=80&w=800", available: true },
            { id: "fr1", name: "Coffee Frappé", description: "Blended coffee dengan whipped cream mewah.", price: 24000, category: "Blended", image: "https://images.unsplash.com/photo-1579992357154-faf4bde95b3d?q=80&w=800", available: true }
        ];

        let cart = JSON.parse(localStorage.getItem('tomoro-cart-standalone')) || [];
        let activeCategory = "Semua";

        const renderCategories = () => {
            const container = document.getElementById('categories');
            const cats = ["Semua", ...new Set(menuItems.map(i => i.category))];
            container.innerHTML = cats.map(c => `
                <button onclick="setCategory('${c}')" class="px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all ${activeCategory === c ? 'bg-tomoro-brown text-white shadow-xl' : 'bg-white text-tomoro-brown/40 border border-gray-100 hover:text-tomoro-gold'}">${c}</button>
            `).join('');
        };

        const renderMenu = () => {
            document.getElementById('product-grid').innerHTML = menuItems.filter(i => activeCategory === "Semua" || i.category === activeCategory).map(p => `
                <div class="animate-fade-in group bg-white rounded-[2.5rem] overflow-hidden shadow-sm hover:shadow-2xl transition-all duration-700 border border-gray-50 flex flex-col cursor-pointer" onclick="addToCart('${p.id}')">
                    <div class="relative aspect-[4/5] overflow-hidden bg-tomoro-cream">
                        <img src="${p.image}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        ${p.isNew ? '<div class="absolute top-6 left-6 bg-tomoro-gold text-white text-[8px] font-black px-4 py-1.5 rounded-full shadow-2xl tracking-[0.2em]">NEW</div>' : ''}
                        <div class="absolute inset-0 bg-gradient-to-t from-tomoro-brown/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-6">
                            <span class="w-full bg-white text-tomoro-brown font-black py-4 rounded-2xl text-center shadow-2xl text-xs tracking-widest uppercase">Tambah</span>
                        </div>
                    </div>
                    <div class="p-8 flex flex-col flex-1">
                        <span class="text-[9px] text-tomoro-gold font-black uppercase tracking-[0.3em] mb-3">${p.category}</span>
                        <h3 class="font-heading font-black text-2xl text-tomoro-brown uppercase tracking-tighter mb-4">${p.name}</h3>
                        <p class="text-gray-400 text-sm mb-8 font-light italic leading-relaxed line-clamp-2">${p.description}</p>
                        <span class="text-2xl font-black text-tomoro-brown mt-auto">Rp ${p.price.toLocaleString()}</span>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        };

        const updateCartUI = () => {
            const count = cart.reduce((s, i) => s + i.quantity, 0);
            const sub = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            [document.getElementById('cart-count-desktop'), document.getElementById('cart-count-mobile')].forEach(el => {
                el.innerText = count;
                el.classList.toggle('hidden', count === 0);
            });
            const itemsCont = document.getElementById('cart-items');
            if (cart.length === 0) itemsCont.innerHTML = '<div class="h-full flex flex-col items-center justify-center text-gray-300 py-20"><i data-lucide="shopping-bag" class="h-16 w-16 mb-4 opacity-50"></i><p class="italic text-sm">Keranjang kosong</p></div>';
            else itemsCont.innerHTML = cart.map(i => `
                <div class="flex gap-6 bg-white p-5 rounded-3xl shadow-sm border border-gray-50">
                    <img src="${i.image}" class="w-20 h-20 object-cover rounded-2xl">
                    <div class="flex-1 flex flex-col justify-between">
                        <div>
                            <h3 class="font-black text-tomoro-brown uppercase tracking-tighter">${i.name}</h3>
                            <span class="text-tomoro-gold font-bold text-sm">Rp ${i.price.toLocaleString()}</span>
                        </div>
                        <div class="flex items-center justify-between mt-4">
                            <div class="flex bg-tomoro-cream rounded-xl px-2 py-1 border border-gray-100 items-center gap-3">
                                <button onclick="q('${i.id}',-1)" class="p-1"><i data-lucide="minus-circle" class="w-4 h-4"></i></button>
                                <span class="font-black text-xs">${i.quantity}</span>
                                <button onclick="q('${i.id}',1)" class="p-1"><i data-lucide="plus-circle" class="w-4 h-4"></i></button>
                            </div>
                            <button onclick="rm('${i.id}')" class="text-[10px] font-black uppercase text-red-500 hover:underline">Hapus</button>
                        </div>
                    </div>
                </div>
            `).join('');
            document.getElementById('cart-footer').classList.toggle('hidden', cart.length === 0);
            document.getElementById('cart-total').innerText = `Rp ${sub.toLocaleString()}`;
            lucide.createIcons();
        };

        const setCategory = (c) => { activeCategory = c; renderCategories(); renderMenu(); };
        const addToCart = (id) => { const p = menuItems.find(i => i.id === id); const e = cart.find(i => i.id === id); if (e) e.quantity++; else cart.push({...p, quantity: 1}); save(); };
        const rm = (id) => { cart = cart.filter(i => i.id !== id); save(); };
        const q = (id, d) => { const i = cart.find(x => x.id === id); if (i) { i.quantity += d; if (i.quantity <= 0) rm(id); else save(); } };
        const save = () => { localStorage.setItem('tomoro-cart-standalone', JSON.stringify(cart)); updateCartUI(); };
        const toggleCart = (s) => { 
            const side = document.getElementById('cart-sidebar'); 
            const back = document.getElementById('cart-backdrop');
            if (s) { side.classList.remove('translate-x-full'); back.classList.remove('hidden'); }
            else { side.classList.add('translate-x-full'); back.classList.add('hidden'); }
        };
        const openCheckout = () => {
            const orderId = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('order-id').innerText = `#TMR-${orderId}`;
            document.getElementById('checkout-modal').classList.remove('hidden');
            setTimeout(() => { cart = []; save(); }, 3000);
        };
        const closeCheckout = () => { document.getElementById('checkout-modal').classList.add('hidden'); };

        document.addEventListener('DOMContentLoaded', () => { renderCategories(); renderMenu(); updateCartUI(); lucide.createIcons(); });
    </script>
</body>
</html>
